name: Release

on:
    release:
        types: [published]

jobs:
    release:
        name: Prepare release
        runs-on: ubuntu-latest
        steps:
            - uses: "actions/checkout@v4"
            - name: "Set version number"
              run: |
                  yq -i -o json '.version="${{ github.event.release.tag_name }}"' \
                    "${{ github.workspace }}/custom_components/vtherm_climate_replication/manifest.json"
            # Pack the HACS dir as a zip and upload to the release
            - name: ZIP VTherm Climate Replication Dir
              run: |
                  cd "${{ github.workspace }}/custom_components/vtherm_climate_replication"
                  zip vtherm_climate_replication.zip -r ./
            - name: Upload zip to release
              uses: softprops/action-gh-release@v2.2.1
              with:
                  files: ${{ github.workspace }}/custom_components/vtherm_climate_replication/vtherm_climate_replication.zip
